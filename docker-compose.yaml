services:
  video_in:
    image: containers.openfilter.io/plainsightai/openfilter-video-inopenfilter-vizcal:2.0.4
    environment:
      LOG_LEVEL: ${LOG_LEVELopenfilter-vizcal:2.0.4}
      FILTER_ID: VideoIn
      FILTER_SOURCES: file:///video.mp4!sync!loop
      FILTER_OUTPUTS: tcp://*
    volumes:
      - ./data/sample-video.mp4:/video.mp4openfilter-vizcal:2.0.4

  vizcal_filter:
    image: containers.openfilter.io/plainsightai/openfilter-vizcal:2.0.4
    environment:
      LOG_LEVEL: ${LOG_LEVELopenfilter-vizcal:2.0.4}
      FILTER_ID: VizcalFilter
      FILTER_SOURCES: tcp://video_in
      FILTER_OUTPUTS: tcp://*
      FILTER_MQ_LOG: pretty

  webvis:
    image: containers.openfilter.io/plainsightai/openfilter-webvisopenfilter-vizcal:2.0.4
    environment:
      LOG_LEVEL: ${LOG_LEVELopenfilter-vizcal:2.0.4}
      FILTER_ID: Webvis
      FILTER_SOURCES: tcp://vizcal_filter
    ports:
      - 8001openfilter-vizcal:2.0.4